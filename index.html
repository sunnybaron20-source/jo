<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Simple Site</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    header {
      background: #4CAF50;
      color: white;
      padding: 20px;
    }
    main {
      padding: 40px;
    }
    footer {
      background: #333;
      color: white;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
    a {
      color: #4CAF50;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to My Simple Site</h1>
  </header>
  <main>
    <p>This is a basic HTML page created for testing tunnels and public URLs.</p>
    <p>You can edit this text to show whatever you like.</p>
    <p><a href="https://example.com">Visit Example Link</a></p>
  </main>
  <footer>
    <p>&copy; 2026 My Simple Site</p>
  </footer>
</body>
</html>
